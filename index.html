<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>우리나라 지도 퀴즈 — 시·도 위치 맞추기</title>
<style>
  :root {
    --rausch: #ff385c;
    --rausch-active: #e00b41;
    --ink: #222222;
    --body: #3f3f3f;
    --muted: #6a6a6a;
    --muted-soft: #929292;
    --canvas: #ffffff;
    --surface-soft: #f7f7f7;
    --surface-strong: #f2f2f2;
    --hairline: #dddddd;
    --hairline-soft: #ebebeb;
    --correct: #008a05;
    --wrong: #c13515;
    --highlight: #ffb400;
    --shadow-card: rgba(0,0,0,0.02) 0 0 0 1px,
                    rgba(0,0,0,0.04) 0 2px 6px 0,
                    rgba(0,0,0,0.1) 0 4px 8px 0;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--canvas);
    color: var(--ink);
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard",
                 system-ui, "Segoe UI", Roboto, "Helvetica Neue",
                 "Noto Sans KR", sans-serif;
    font-size: 16px;
    line-height: 1.5;
  }

  /* ─── 헤더 ───────────────────────────── */
  header.top-nav {
    height: 80px;
    border-bottom: 1px solid var(--hairline);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    background: var(--canvas);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-weight: 600;
    color: var(--rausch);
    font-size: 18px;
  }
  .brand-icon {
    width: 32px; height: 32px;
    flex-shrink: 0;
  }
  .top-nav-actions {
    display: flex;
    gap: 8px;
  }

  /* ─── 메인 컨테이너 ──────────────────── */
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 32px 24px 64px;
  }

  /* ─── 버튼 ──────────────────────────── */
  .btn {
    font-family: inherit;
    font-size: 16px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    padding: 14px 24px;
    border-radius: 8px;
    transition: background-color 180ms ease, color 180ms ease;
    min-height: 48px;
    line-height: 1.25;
  }
  .btn:focus-visible {
    outline: 2px dashed var(--ink);
    outline-offset: 2px;
  }
  .btn-primary {
    background: var(--rausch);
    color: #fff;
  }
  .btn-primary:hover {
    background: var(--rausch-active);
  }
  .btn-secondary {
    background: var(--canvas);
    color: var(--ink);
    border: 1px solid var(--ink);
  }
  .btn-secondary:hover {
    background: var(--surface-soft);
  }
  .btn-tertiary {
    background: transparent;
    color: var(--ink);
    text-decoration: underline;
    min-height: 40px;
    padding: 8px 12px;
  }

  /* ─── 시작 화면 ─────────────────────── */
  .screen-start {
    text-align: center;
    padding: 48px 24px;
  }
  .screen-start h1 {
    font-size: 36px;
    font-weight: 700;
    margin: 0 0 12px;
    line-height: 1.2;
    color: var(--ink);
  }
  .screen-start p.lead {
    font-size: 18px;
    color: var(--body);
    max-width: 560px;
    margin: 0 auto 32px;
  }
  .start-cta-row {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .start-meta {
    margin-top: 32px;
    color: var(--muted);
    font-size: 14px;
  }

  /* ─── 퀴즈 화면 ─────────────────────── */
  .quiz-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
  }
  .question-card {
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .question-text {
    font-size: 26px;
    font-weight: 700;
    color: var(--ink);
    margin: 0;
  }
  .question-text .target {
    color: var(--rausch);
  }
  .chip-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 9999px;
    border: 1px solid var(--hairline);
    background: var(--canvas);
    color: var(--ink);
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
  }
  .chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .chip .dot.correct { background: var(--correct); }
  .chip .dot.wrong { background: var(--wrong); }

  .feedback {
    min-height: 28px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    padding: 4px 0;
  }
  .feedback.correct { color: var(--correct); }
  .feedback.wrong { color: var(--wrong); }

  /* ─── 지도 ──────────────────────────── */
  .map-wrap {
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 16px;
  }
  .korea-map {
    display: block;
    width: 100%;
    height: auto;
    max-height: 70vh;
  }
  .korea-map .region {
    fill: var(--surface-strong);
    stroke: var(--hairline);
    stroke-width: 1.2;
    cursor: pointer;
    transition: fill 180ms ease;
  }
  .korea-map .region:hover {
    fill: var(--surface-soft);
  }
  .korea-map .region:focus-visible {
    outline: none;
    stroke: var(--ink);
    stroke-width: 2.5;
    stroke-dasharray: 4 3;
  }
  .korea-map .region.done {
    fill: var(--hairline-soft);
    cursor: default;
    pointer-events: none;
  }
  .korea-map .region.flash-correct {
    fill: var(--correct);
    fill-opacity: 0.8;
  }
  .korea-map .region.flash-wrong {
    fill: var(--wrong);
    fill-opacity: 0.65;
  }
  .korea-map .region.flash-target {
    stroke: var(--highlight);
    stroke-width: 4;
    stroke-dasharray: 6 4;
  }
  .korea-map .region-label {
    pointer-events: none;
    font-size: 11px;
    font-weight: 600;
    fill: var(--ink);
    text-anchor: middle;
    dominant-baseline: middle;
    user-select: none;
  }
  .korea-map .region-label.metro {
    font-size: 10px;
    fill: var(--body);
  }

  /* hint mode shows labels always */
  .map-wrap[data-hint="on"] .region-label { opacity: 1; }
  .map-wrap[data-hint="off"] .region-label { opacity: 0; }

  .map-controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 8px;
    gap: 12px;
    flex-wrap: wrap;
    font-size: 14px;
    color: var(--muted);
  }
  .hint-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--ink);
    user-select: none;
  }
  .hint-toggle input { margin: 0; }

  /* ─── 결과 화면 ─────────────────────── */
  .screen-result {
    text-align: center;
    padding: 24px;
  }
  .result-rate {
    font-size: 72px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.1;
    margin: 0;
    letter-spacing: -1px;
  }
  .result-rate.full { color: var(--correct); }
  .result-tagline {
    font-size: 18px;
    font-weight: 500;
    color: var(--body);
    margin: 8px 0 24px;
  }
  .result-stats {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-block { min-width: 120px; }
  .stat-label { font-size: 14px; color: var(--muted); }
  .stat-value { font-size: 24px; font-weight: 600; color: var(--ink); }
  .wrong-list {
    margin: 16px auto 24px;
    max-width: 640px;
    text-align: left;
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 16px 20px;
    background: var(--surface-soft);
  }
  .wrong-list h3 {
    font-size: 16px;
    margin: 0 0 8px;
    color: var(--ink);
  }
  .wrong-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .wrong-chips .wchip {
    padding: 4px 10px;
    border-radius: 9999px;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    font-size: 13px;
    color: var(--ink);
  }
  .result-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  /* ─── 모드 전환 ─────────────────────── */
  .screen { display: none; }
  body[data-mode="start"] #screen-start { display: block; }
  body[data-mode="quiz"] #screen-quiz { display: block; }
  body[data-mode="result"] #screen-result { display: block; }

  /* ─── 인쇄 모드 ─────────────────────── */
  body[data-mode="print"] header.top-nav,
  body[data-mode="print"] #screen-start,
  body[data-mode="print"] #screen-quiz,
  body[data-mode="print"] #screen-result { display: none; }
  body[data-mode="print"] #screen-print { display: block; }
  #screen-print { display: none; }

  .print-actions {
    text-align: center;
    margin-bottom: 16px;
  }
  .print-area {
    border: 1px solid var(--hairline);
    border-radius: 14px;
    padding: 24px;
    background: var(--canvas);
  }
  .print-area h2 {
    margin: 0 0 16px;
    font-size: 22px;
    text-align: center;
  }
  .print-area .korea-map .region {
    fill: var(--canvas);
    stroke: var(--ink);
    stroke-width: 1.2;
    cursor: default;
    pointer-events: none;
  }
  .print-area .number-label {
    font-size: 12px;
    font-weight: 700;
    fill: var(--ink);
    text-anchor: middle;
    dominant-baseline: middle;
    pointer-events: none;
  }
  .answer-key {
    margin-top: 16px;
    columns: 3;
    column-gap: 16px;
    font-size: 13px;
    color: var(--body);
  }
  .answer-key li { break-inside: avoid; padding: 2px 0; }

  @media print {
    @page { size: A4; margin: 16mm; }
    header.top-nav, .print-actions { display: none !important; }
    body { background: #fff; }
    main { padding: 0; }
    .print-area { border: none; padding: 0; }
    .korea-map { max-height: none; height: 800px; }
  }

  @media (prefers-reduced-motion: reduce) {
    .korea-map .region,
    .btn { transition: none !important; }
  }

  /* ─── 모바일 ────────────────────────── */
  @media (max-width: 640px) {
    main { padding: 16px 12px 48px; }
    .screen-start h1 { font-size: 28px; }
    .question-text { font-size: 20px; }
    .result-rate { font-size: 56px; }
    header.top-nav { height: 64px; padding: 0 12px; }
  }
</style>
</head>
<body data-mode="start">

<header class="top-nav">
  <div class="brand">
    <svg class="brand-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="currentColor" d="M12 2L4 8v8l8 6 8-6V8l-8-6zm0 2.5L18 9v6l-6 4.5L6 15V9l6-4.5z"/>
      <circle cx="12" cy="12" r="2.5" fill="currentColor"/>
    </svg>
    <span>우리나라 지도 퀴즈</span>
  </div>
  <div class="top-nav-actions">
    <button class="btn btn-tertiary" id="btn-go-print" aria-label="학습지 인쇄 모드로 전환">
      학습지 인쇄
    </button>
  </div>
</header>

<main>

<!-- ─── 시작 화면 ─────────────────── -->
<section id="screen-start" class="screen screen-start" aria-labelledby="start-title">
  <h1 id="start-title">시·도 17개,<br>지도 위에서 찾아봐요</h1>
  <p class="lead">
    무작위로 제시되는 시·도를 지도 위에서 클릭해 맞추는 퀴즈입니다.
    전체 17문제, 평균 2분 안에 끝나요. TV 시연·1:1 학습 모두 가능합니다.
  </p>
  <div class="start-cta-row">
    <button class="btn btn-primary" id="btn-start">퀴즈 시작</button>
    <button class="btn btn-secondary" id="btn-start-print">학습지 인쇄</button>
  </div>
  <p class="start-meta">
    학생 정보 저장 없음 · 오프라인 동작 · 4~6학년 권장
  </p>
</section>

<!-- ─── 퀴즈 화면 ─────────────────── -->
<section id="screen-quiz" class="screen" aria-labelledby="quiz-title">
  <div class="quiz-grid">
    <div class="question-card" role="region" aria-live="polite">
      <p class="question-text" id="quiz-title"><span class="target" id="target-name">강원특별자치도</span><span>를 찾으세요</span></p>
      <div class="chip-row">
        <span class="chip" id="chip-progress">1 / 17</span>
        <span class="chip"><span class="dot correct"></span><span id="chip-correct">0</span></span>
        <span class="chip"><span class="dot wrong"></span><span id="chip-wrong">0</span></span>
      </div>
    </div>

    <div class="feedback" id="feedback" aria-live="assertive"></div>

    <div class="map-wrap" data-hint="off" id="map-wrap-quiz">
      <!-- SVG injected by JS into this slot -->
      <div id="map-slot-quiz"></div>
      <div class="map-controls">
        <label class="hint-toggle">
          <input type="checkbox" id="hint-toggle">
          <span>이름 힌트 표시 (자유 학습용)</span>
        </label>
        <button class="btn btn-tertiary" id="btn-quit">처음으로</button>
      </div>
    </div>
  </div>
</section>

<!-- ─── 결과 화면 ─────────────────── -->
<section id="screen-result" class="screen screen-result" aria-labelledby="result-title">
  <h2 id="result-title" class="result-rate" data-testid="result-rate">100%</h2>
  <p class="result-tagline" id="result-tagline">잘했어요</p>
  <div class="result-stats">
    <div class="stat-block">
      <div class="stat-label">정답</div>
      <div class="stat-value" id="stat-correct">17 / 17</div>
    </div>
    <div class="stat-block">
      <div class="stat-label">소요 시간</div>
      <div class="stat-value" id="stat-time">1분 23초</div>
    </div>
  </div>
  <div class="wrong-list" id="wrong-list-wrap" hidden>
    <h3>다시 확인할 시·도</h3>
    <div class="wrong-chips" id="wrong-chips"></div>
  </div>
  <div class="result-actions">
    <button class="btn btn-primary" id="btn-retry-all">처음부터 다시</button>
    <button class="btn btn-secondary" id="btn-retry-wrong" hidden>오답만 재시험</button>
  </div>
</section>

<!-- ─── 인쇄 모드 ─────────────────── -->
<section id="screen-print" class="screen">
  <div class="print-actions">
    <button class="btn btn-secondary" id="btn-print-now">이 페이지 인쇄</button>
    <button class="btn btn-tertiary" id="btn-print-back">돌아가기</button>
  </div>
  <div class="print-area">
    <h2>우리나라 시·도 학습지 — 빈 지도에 이름 쓰기</h2>
    <div id="map-slot-print"></div>
    <ol class="answer-key" id="answer-key">
      <!-- numbered list of regions injected by JS -->
    </ol>
  </div>
</section>

</main>

<script>
/* ──────────────────────────────────────────────────
 * 17 광역 시·도 — 정답·SVG path
 * 좌표는 viewBox 800×920 기준 단순화된 모식도.
 * 정확한 지도가 아닌 상대 위치 학습용.
 * ────────────────────────────────────────────────── */
const REGIONS = [
  // 광역도 (province) — 큰 영역. 먼저 그려서 z-order 아래에.
  { id:"gangwon",  name:"강원특별자치도", type:"province",
    d:"M380,150 L600,135 L660,180 L660,260 L620,330 L520,340 L440,320 L390,270 Z",
    label:{x:520,y:230} },
  { id:"gyeonggi", name:"경기도", type:"province",
    d:"M180,210 L380,180 L390,270 L400,330 L370,370 L260,370 L180,310 Z",
    label:{x:300,y:300} },
  { id:"chungbuk", name:"충청북도", type:"province",
    d:"M340,370 L440,320 L520,340 L530,420 L470,470 L390,460 L350,420 Z",
    label:{x:440,y:400} },
  { id:"chungnam", name:"충청남도", type:"province",
    d:"M180,310 L260,370 L340,370 L350,420 L310,470 L210,490 L150,440 L160,370 Z",
    label:{x:230,y:420} },
  { id:"jeonbuk",  name:"전북특별자치도", type:"province",
    d:"M150,490 L370,490 L380,580 L320,615 L200,620 L150,580 Z",
    label:{x:260,y:560} },
  { id:"jeonnam",  name:"전라남도", type:"province",
    d:"M150,620 L320,620 L390,640 L420,690 L350,770 L200,775 L130,710 Z",
    label:{x:240,y:710} },
  { id:"gyeongbuk",name:"경상북도", type:"province",
    d:"M520,340 L660,340 L700,400 L690,490 L660,560 L590,580 L530,540 L530,460 Z",
    label:{x:620,y:450} },
  { id:"gyeongnam",name:"경상남도", type:"province",
    d:"M380,510 L530,510 L530,540 L590,580 L555,650 L450,690 L390,640 L370,580 Z",
    label:{x:480,y:600} },
  { id:"jeju",     name:"제주특별자치도", type:"province",
    d:"M230,855 Q280,820 360,855 Q380,880 330,895 Q260,905 220,885 Z",
    label:{x:295,y:870} },

  // 광역시 / 특별시 — 작은 영역. 나중에 그려서 위에 놓임.
  { id:"seoul",  name:"서울특별시", type:"metro",
    d:"M278,238 L322,234 L327,278 L283,282 Z",
    label:{x:303,y:260} },
  { id:"incheon", name:"인천광역시", type:"metro",
    d:"M150,250 L210,243 L222,288 L160,300 Z",
    label:{x:185,y:275} },
  { id:"sejong",  name:"세종특별자치시", type:"metro",
    d:"M298,393 L336,393 L336,418 L298,418 Z",
    label:{x:317,y:406} },
  { id:"daejeon", name:"대전광역시", type:"metro",
    d:"M306,423 L356,423 L356,458 L306,458 Z",
    label:{x:331,y:441} },
  { id:"daegu",   name:"대구광역시", type:"metro",
    d:"M540,490 L592,488 L598,540 L548,544 Z",
    label:{x:570,y:516} },
  { id:"ulsan",   name:"울산광역시", type:"metro",
    d:"M620,540 L668,538 L675,590 L626,594 Z",
    label:{x:648,y:566} },
  { id:"busan",   name:"부산광역시", type:"metro",
    d:"M560,630 L622,624 L630,672 L572,680 Z",
    label:{x:597,y:652} },
  { id:"gwangju", name:"광주광역시", type:"metro",
    d:"M236,668 L294,665 L302,712 L242,716 Z",
    label:{x:270,y:692} },
];

/* ──────────────────────────────────────────────────
 * SVG 생성
 * ────────────────────────────────────────────────── */
const SVG_NS = "http://www.w3.org/2000/svg";

function buildMapSvg({ mode, showLabels, numbered }) {
  const svg = document.createElementNS(SVG_NS, "svg");
  svg.setAttribute("viewBox", "0 0 800 920");
  svg.setAttribute("class", "korea-map");
  svg.setAttribute("role", "img");
  svg.setAttribute("aria-label", "우리나라 시·도 지도");

  REGIONS.forEach((r, idx) => {
    const path = document.createElementNS(SVG_NS, "path");
    path.setAttribute("d", r.d);
    path.setAttribute("class", "region region-" + r.type);
    path.setAttribute("data-id", r.id);
    path.setAttribute("data-name", r.name);
    if (mode === "quiz") {
      path.setAttribute("tabindex", "0");
      path.setAttribute("role", "button");
      path.setAttribute("aria-label", r.name + " 영역");
    } else {
      path.setAttribute("tabindex", "-1");
      path.setAttribute("aria-hidden", "true");
    }
    svg.appendChild(path);

    // 라벨
    if (numbered) {
      const num = document.createElementNS(SVG_NS, "text");
      num.setAttribute("class", "number-label");
      num.setAttribute("x", r.label.x);
      num.setAttribute("y", r.label.y);
      num.textContent = String(idx + 1);
      svg.appendChild(num);
    } else if (showLabels) {
      const label = document.createElementNS(SVG_NS, "text");
      label.setAttribute("class", "region-label" + (r.type === "metro" ? " metro" : ""));
      label.setAttribute("x", r.label.x);
      label.setAttribute("y", r.label.y);
      label.textContent = r.name.replace("특별자치도","").replace("특별자치시","").replace("광역시","").replace("특별시","");
      svg.appendChild(label);
    }
  });
  return svg;
}

/* ──────────────────────────────────────────────────
 * 상태 관리
 * ────────────────────────────────────────────────── */
const state = {
  queue: [],
  index: 0,
  correct: [],
  wrong: [],   // {id, name}
  startedAt: 0,
  endedAt: 0,
  lastWrongIds: [],
  locked: false,  // 정답·오답 애니메이션 중 입력 막기
};

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startQuiz(subset) {
  const ids = subset && subset.length ? subset : REGIONS.map(r => r.id);
  state.queue = shuffle(ids);
  state.index = 0;
  state.correct = [];
  state.wrong = [];
  state.startedAt = Date.now();
  state.locked = false;

  // 지도 마운트
  const slot = document.getElementById("map-slot-quiz");
  slot.innerHTML = "";
  const svg = buildMapSvg({ mode: "quiz", showLabels: document.getElementById("hint-toggle").checked });
  slot.appendChild(svg);

  attachMapHandlers(svg);
  document.body.dataset.mode = "quiz";
  renderQuestion();
}

function renderQuestion() {
  const currentId = state.queue[state.index];
  const region = REGIONS.find(r => r.id === currentId);
  document.getElementById("target-name").textContent = region.name;
  document.getElementById("chip-progress").textContent = (state.index + 1) + " / " + state.queue.length;
  document.getElementById("chip-correct").textContent = state.correct.length;
  document.getElementById("chip-wrong").textContent = state.wrong.length;
  document.getElementById("feedback").textContent = "";
  document.getElementById("feedback").className = "feedback";
}

function attachMapHandlers(svg) {
  svg.querySelectorAll(".region").forEach(path => {
    path.addEventListener("click", onRegionActivate);
    path.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        onRegionActivate(e);
      }
    });
  });
}

function onRegionActivate(e) {
  if (state.locked) return;
  const clickedPath = e.currentTarget;
  if (clickedPath.classList.contains("done")) return;
  const clickedId = clickedPath.dataset.id;
  const targetId = state.queue[state.index];
  const targetRegion = REGIONS.find(r => r.id === targetId);

  state.locked = true;

  if (clickedId === targetId) {
    state.correct.push(targetId);
    flashCorrect(clickedPath, () => {
      clickedPath.classList.add("done");
      advance();
    });
    setFeedback("정답이에요!", "correct");
  } else {
    state.wrong.push({ id: targetId, name: targetRegion.name });
    const targetPath = svgFindRegion(targetId);
    flashWrong(clickedPath, targetPath, () => {
      if (targetPath) targetPath.classList.add("done");
      advance();
    });
    setFeedback("아쉬워요. 정답은 " + targetRegion.name + " 였어요.", "wrong");
  }
}

function svgFindRegion(id) {
  return document.querySelector('#map-slot-quiz .region[data-id="' + id + '"]');
}

function setFeedback(text, kind) {
  const el = document.getElementById("feedback");
  el.textContent = text;
  el.className = "feedback " + kind;
}

function flashCorrect(path, done) {
  path.classList.add("flash-correct");
  setTimeout(() => {
    path.classList.remove("flash-correct");
    done();
  }, 500);
}

function flashWrong(clicked, target, done) {
  clicked.classList.add("flash-wrong");
  if (target && target !== clicked) target.classList.add("flash-target");
  setTimeout(() => {
    clicked.classList.remove("flash-wrong");
    if (target) target.classList.remove("flash-target");
    done();
  }, 1100);
}

function advance() {
  state.index += 1;
  state.locked = false;
  if (state.index >= state.queue.length) {
    finishQuiz();
  } else {
    renderQuestion();
  }
}

function finishQuiz() {
  state.endedAt = Date.now();
  state.lastWrongIds = state.wrong.map(w => w.id);

  const total = state.queue.length;
  const correctCount = state.correct.length;
  const wrongCount = state.wrong.length;
  const rate = Math.round((correctCount / total) * 100);
  const secs = Math.max(1, Math.round((state.endedAt - state.startedAt) / 1000));
  const mm = Math.floor(secs / 60);
  const ss = secs % 60;
  const timeText = mm > 0 ? (mm + "분 " + ss + "초") : (ss + "초");

  const rateEl = document.querySelector(".result-rate");
  rateEl.textContent = rate + "%";
  rateEl.classList.toggle("full", rate === 100);

  const tagline = rate === 100 ? "전부 맞췄어요. 완벽해요!"
                : rate >= 80   ? "거의 다 맞췄어요. 잘했어요!"
                : rate >= 60   ? "조금만 더 익히면 돼요."
                :                "지도를 한 번 더 살펴봐요.";
  document.getElementById("result-tagline").textContent = tagline;

  document.getElementById("stat-correct").textContent = correctCount + " / " + total;
  document.getElementById("stat-time").textContent = timeText;

  const wrapEl = document.getElementById("wrong-list-wrap");
  const chipsEl = document.getElementById("wrong-chips");
  const retryWrongBtn = document.getElementById("btn-retry-wrong");
  chipsEl.innerHTML = "";
  if (wrongCount > 0) {
    state.wrong.forEach(w => {
      const span = document.createElement("span");
      span.className = "wchip";
      span.textContent = w.name;
      chipsEl.appendChild(span);
    });
    wrapEl.hidden = false;
    retryWrongBtn.hidden = false;
  } else {
    wrapEl.hidden = true;
    retryWrongBtn.hidden = true;
  }

  document.body.dataset.mode = "result";
}

/* ──────────────────────────────────────────────────
 * 인쇄 모드
 * ────────────────────────────────────────────────── */
function enterPrintMode() {
  const slot = document.getElementById("map-slot-print");
  slot.innerHTML = "";
  slot.appendChild(buildMapSvg({ mode: "print", numbered: true }));

  const ol = document.getElementById("answer-key");
  ol.innerHTML = "";
  REGIONS.forEach((r) => {
    const li = document.createElement("li");
    li.textContent = r.name;
    ol.appendChild(li);
  });

  document.body.dataset.mode = "print";
}

/* ──────────────────────────────────────────────────
 * 이벤트 바인딩
 * ────────────────────────────────────────────────── */
document.getElementById("btn-start").addEventListener("click", () => startQuiz());
document.getElementById("btn-start-print").addEventListener("click", enterPrintMode);
document.getElementById("btn-go-print").addEventListener("click", enterPrintMode);
document.getElementById("btn-quit").addEventListener("click", () => {
  document.body.dataset.mode = "start";
});
document.getElementById("btn-retry-all").addEventListener("click", () => startQuiz());
document.getElementById("btn-retry-wrong").addEventListener("click", () => {
  if (state.lastWrongIds.length === 0) return;
  startQuiz(state.lastWrongIds);
});
document.getElementById("btn-print-now").addEventListener("click", () => window.print());
document.getElementById("btn-print-back").addEventListener("click", () => {
  document.body.dataset.mode = "start";
});

document.getElementById("hint-toggle").addEventListener("change", (e) => {
  const wrap = document.getElementById("map-wrap-quiz");
  wrap.dataset.hint = e.target.checked ? "on" : "off";
  // 라벨 동적 추가/제거
  const slot = document.getElementById("map-slot-quiz");
  if (!slot.firstChild) return;
  // 단순화: 다시 빌드 (퀴즈 진행 중인 done 상태를 유지)
  const doneIds = Array.from(slot.querySelectorAll(".region.done")).map(p => p.dataset.id);
  slot.innerHTML = "";
  const svg = buildMapSvg({ mode: "quiz", showLabels: e.target.checked });
  slot.appendChild(svg);
  doneIds.forEach(id => {
    const p = svg.querySelector('.region[data-id="' + id + '"]');
    if (p) p.classList.add("done");
  });
  attachMapHandlers(svg);
});
</script>
</body>
</html>
